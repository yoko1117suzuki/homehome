<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ほめほめコイン</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #FFF8F0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== ヘッダー ===== */
header {
  background: linear-gradient(135deg, #FF8C69 0%, #FFB347 100%);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
header h1 { color: white; font-size: 20px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }

/* ===== タブ ===== */
.tabs { display: flex; gap: 8px; padding: 14px 20px 0; }
.tab {
  padding: 10px 32px; border-radius: 12px 12px 0 0;
  border: none; font-size: 15px; font-weight: bold; cursor: pointer;
  transition: all 0.2s; background: #ddd; color: #888;
}
.tab.active { background: white; color: #FF8C69; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); }

/* ===== メイン ===== */
main {
  background: white;
  margin: 0 20px 24px;
  border-radius: 0 14px 14px 14px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 24px;
  min-height: 600px;
}

/* ===== 左パネル：瓶 ===== */
.jar-panel {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.student-badge {
  display: flex; align-items: center; gap: 10px;
  background: #FFF3E0; border-radius: 10px;
  padding: 10px 16px; width: 100%;
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: bold; color: white; flex-shrink: 0;
}
.student-name { font-size: 15px; font-weight: bold; color: #333; }

/* 瓶 */
.jar-wrap { position: relative; width: 180px; }
.jar-svg { width: 180px; height: 300px; }

/* 瓶の中のコイン表示エリア（SVGでクリップ） */
#coin-area { }

/* カウント表示 */
.coin-count {
  text-align: center;
  background: linear-gradient(135deg, #FF8C69, #FFB347);
  color: white;
  border-radius: 20px;
  padding: 8px 24px;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 3px 10px rgba(255,140,105,0.4);
  min-width: 140px;
}
.coin-count span { font-size: 13px; opacity: 0.9; }

/* マイルストーン */
.milestone {
  font-size: 12px; color: #888; text-align: center;
  background: #FFF9C4; border-radius: 8px;
  padding: 6px 12px; width: 100%;
}
.milestone b { color: #FF8C69; }

/* ===== 右パネル ===== */
.right-panel { display: flex; flex-direction: column; gap: 16px; }

/* 行動ボタン一覧 */
.section-title {
  font-size: 13px; font-weight: bold; color: #888;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}
.behavior-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.behavior-btn {
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12.5px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex; align-items: center; gap: 8px;
  font-weight: bold;
  background: #f8f8f8;
  color: #444;
}
.behavior-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
.behavior-btn:active { transform: scale(0.97); }
.behavior-btn .icon { font-size: 18px; flex-shrink: 0; }

/* 自由入力 */
.free-input-row {
  display: flex; gap: 8px; align-items: flex-end;
}
.free-input-row textarea {
  flex: 1; padding: 10px 12px;
  border: 2px solid #eee; border-radius: 10px;
  font-size: 13px; font-family: inherit;
  resize: none; height: 58px; outline: none;
  transition: border 0.2s;
}
.free-input-row textarea:focus { border-color: #FFB347; }
.btn-add-free {
  background: linear-gradient(135deg, #FF8C69, #FFB347);
  color: white; border: none; border-radius: 10px;
  padding: 0 18px; height: 58px;
  font-size: 22px; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  flex-shrink: 0;
}
.btn-add-free:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,140,105,0.4); }

/* 記録一覧 */
.records-header { display: flex; justify-content: space-between; align-items: center; }
.btn-export {
  background: white; color: #FF8C69;
  border: 2px solid #FF8C69; border-radius: 8px;
  padding: 5px 14px; font-size: 12px; font-weight: bold;
  cursor: pointer; transition: all 0.2s;
}
.btn-export:hover { background: #FF8C69; color: white; }

.records-list {
  max-height: 240px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
  padding-right: 4px;
}
.records-list::-webkit-scrollbar { width: 4px; }
.records-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.record-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  background: #fafafa;
  font-size: 12.5px;
  animation: fadeIn 0.3s ease;
  border-left: 4px solid transparent;
}
.record-coin { font-size: 18px; flex-shrink: 0; }
.record-text { flex: 1; color: #333; line-height: 1.4; }
.record-date { font-size: 10px; color: #bbb; white-space: nowrap; }
.record-del {
  background: none; border: none; color: #ccc;
  cursor: pointer; font-size: 14px; padding: 0 2px;
  flex-shrink: 0;
}
.record-del:hover { color: #e55; }
.record-edit-label {
  background: none; border: none; color: #bbb;
  cursor: pointer; font-size: 13px; padding: 0 2px;
  flex-shrink: 0;
}
.record-edit-label:hover { color: #42A5F5; }
.record-edit-date {
  background: none; border: none; color: #bbb;
  cursor: pointer; font-size: 13px; padding: 0 2px;
  flex-shrink: 0;
}
.record-edit-date:hover { color: #FF8C69; }

.empty-msg {
  text-align: center; padding: 32px; color: #ccc;
  font-size: 13px;
}
.empty-msg .e { font-size: 36px; margin-bottom: 8px; }

/* ===== コイン落下アニメーション ===== */
.coin-fly {
  position: fixed;
  font-size: 32px;
  pointer-events: none;
  z-index: 9999;
  animation: coinFall 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes coinFall {
  0%   { transform: translateY(0) scale(1.2); opacity: 1; }
  60%  { opacity: 1; }
  100% { transform: translateY(120px) scale(0.6); opacity: 0; }
}

/* ===== お祝いオーバーレイ ===== */
.celebrate {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 9998; pointer-events: none;
  animation: celebFade 2.2s forwards;
}
@keyframes celebFade {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}
.celebrate-box {
  background: white; border-radius: 20px;
  padding: 28px 48px; text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  transform-origin: center;
  animation: celebBounce 2.2s forwards;
}
@keyframes celebBounce {
  0%   { transform: scale(0.5); }
  20%  { transform: scale(1.05); }
  30%  { transform: scale(1.0); }
  70%  { transform: scale(1.0); }
  100% { transform: scale(0.5); }
}
.celebrate-emoji { font-size: 48px; }
.celebrate-text { font-size: 20px; font-weight: bold; color: #FF8C69; margin-top: 8px; }

/* ===== 紙吹雪 ===== */
.confetti {
  position: fixed;
  width: 10px; height: 10px;
  pointer-events: none;
  z-index: 9997;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== ２人合計パネル ===== */
.combined-panel {
  margin: 0 20px 0;
  background: linear-gradient(135deg, #FFF3E0, #FFF9C4);
  border-radius: 12px;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 2px solid #FFE082;
}
.combined-avatars {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.combined-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold; color: white;
  border: 2px solid white;
}
.combined-avatar:last-child { margin-left: -8px; }
.combined-info { flex: 1; }
.combined-label {
  font-size: 11px; color: #999; font-weight: bold; margin-bottom: 4px;
}
.combined-bar-wrap {
  position: relative; background: #EEE; border-radius: 20px;
  height: 18px; overflow: visible;
}
.combined-bar {
  height: 100%; border-radius: 20px;
  background: linear-gradient(90deg, #FF8C69, #FFB347, #FFD700);
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 4px;
  position: relative;
}
.combined-bar::after {
  content: ''; position: absolute; right: 0; top: 0;
  width: 8px; height: 100%; border-radius: 0 20px 20px 0;
  background: rgba(255,255,255,0.4);
}
.milestone-ticks {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.milestone-tick {
  position: absolute; top: -3px;
  width: 3px; height: 24px;
  background: #CCC; border-radius: 2px;
  transform: translateX(-50%);
}
.milestone-tick.reached { background: #FF8C69; }
.milestone-tick-label {
  position: absolute; top: 24px;
  font-size: 9px; color: #AAA; transform: translateX(-50%);
  white-space: nowrap; font-weight: bold;
}
.milestone-tick.reached .milestone-tick-label { color: #FF8C69; }
.combined-count {
  font-size: 22px; font-weight: bold; color: #FF8C69;
  text-align: right; flex-shrink: 0; min-width: 80px;
  line-height: 1;
}
.combined-count small { font-size: 11px; color: #AAA; display: block; }

/* 合同マイルストーンお祝い（より豪華） */
.celebrate-combined {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 9998; pointer-events: none;
  background: rgba(0,0,0,0.3);
  animation: celebFade 3.5s forwards;
}
.celebrate-combined-box {
  background: linear-gradient(135deg, #FFF9C4, #FFFFFF, #FFF3E0);
  border-radius: 24px;
  padding: 36px 56px; text-align: center;
  box-shadow: 0 12px 60px rgba(0,0,0,0.3);
  border: 3px solid #FFD700;
  animation: celebBounce 3.5s forwards;
}
.combined-celebrate-emoji { font-size: 56px; margin-bottom: 4px; }
.combined-celebrate-title {
  font-size: 14px; color: #AAA; font-weight: bold; margin-bottom: 6px;
}
.combined-celebrate-text {
  font-size: 24px; font-weight: bold;
  background: linear-gradient(90deg, #FF8C69, #FFB347, #FF8C69);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.combined-celebrate-sub {
  font-size: 13px; color: #888; margin-top: 8px;
}

/* ===== 日付ピッカーエリア ===== */
.date-pick-row {
  display: flex; align-items: center; gap: 10px;
  background: #F8F8F8; border-radius: 10px;
  padding: 8px 14px; margin-bottom: 10px;
}
.date-pick-row label { font-size: 12px; font-weight: bold; color: #888; white-space: nowrap; }
.date-pick-row input[type="date"] {
  border: 1.5px solid #ddd; border-radius: 8px;
  padding: 6px 10px; font-size: 13px; font-family: inherit;
  outline: none; transition: border 0.2s; background: white;
}
.date-pick-row input[type="date"]:focus { border-color: #FFB347; }
.btn-date-today {
  background: #FFB347; color: white; border: none;
  border-radius: 6px; padding: 5px 10px; font-size: 11px;
  font-weight: bold; font-family: inherit; cursor: pointer;
  white-space: nowrap;
}

/* ===== セッション凡例 ===== */
.session-legend {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 6px;
}
.session-chip {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: #555;
  background: white; border-radius: 20px;
  padding: 2px 8px; border: 1px solid #EEE;
}
.session-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* セグメントバー */
.segment-bar {
  display: flex; width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
}
.segment-piece {
  height: 100%; transition: flex 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.segment-piece::after {
  content:''; position: absolute; right:0; top:0;
  width: 2px; height: 100%; background: rgba(255,255,255,0.5);
}

/* ===== 出力モーダル ===== */
.export-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 10000; animation: fadeIn 0.2s ease;
}
.export-modal-box {
  background: white; border-radius: 18px;
  padding: 28px 32px; width: 420px; max-width: 95vw;
  box-shadow: 0 12px 50px rgba(0,0,0,0.25);
}
.export-modal-box h2 { font-size: 16px; color: #333; margin-bottom: 4px; }
.export-modal-box .modal-sub { font-size: 12px; color: #aaa; margin-bottom: 18px; }
.date-range-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.date-range-row label { font-size: 12px; font-weight: bold; color: #888; }
.date-range-row input[type="date"] {
  padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none; flex: 1; min-width: 130px;
}
.date-range-row input[type="date"]:focus { border-color: #FFB347; }
.export-preview {
  background: #FFF9C4; border-radius: 8px;
  padding: 10px 14px; font-size: 12px; color: #666;
  margin-bottom: 16px; min-height: 36px;
}

/* ===== 日付グループ（記録一覧） ===== */
.date-group { margin-bottom: 12px; }
.date-group-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.date-group-title {
  font-size: 12px; font-weight: bold; color: #FF8C69;
  background: #FFF3E0; border-radius: 20px;
  padding: 3px 12px;
}
.date-group-coins { font-size: 11px; color: #AAA; }
.btn-add-photo {
  margin-left: auto; background: white; color: #66BB6A;
  border: 1.5px solid #66BB6A; border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: bold;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-add-photo:hover { background: #66BB6A; color: white; }
.btn-slideshow {
  background: linear-gradient(135deg, #7C4DFF, #B39DDB);
  color: white; border: none; border-radius: 8px;
  padding: 3px 10px; font-size: 11px; font-weight: bold;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-slideshow:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(124,77,255,0.3); }

/* 写真サムネイルストリップ */
.photo-strip {
  display: flex; gap: 6px; overflow-x: auto;
  margin-bottom: 6px; padding-bottom: 2px;
}
.photo-strip::-webkit-scrollbar { height: 3px; }
.photo-strip::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.photo-thumb {
  position: relative; flex-shrink: 0;
  width: 56px; height: 56px; border-radius: 8px;
  overflow: hidden; cursor: pointer;
  border: 2px solid #EEE; transition: border 0.15s;
}
.photo-thumb:hover { border-color: #66BB6A; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb-del {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,0.5); color: white;
  border: none; border-radius: 50%; width: 16px; height: 16px;
  font-size: 9px; cursor: pointer; display: none;
  align-items: center; justify-content: center; padding: 0;
}
.photo-thumb:hover .photo-thumb-del { display: flex; }

/* ===== スライドショー ===== */
.slideshow-overlay {
  position: fixed; inset: 0;
  background: #111;
  z-index: 20000;
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: ssIn 0.3s ease;
}
@keyframes ssIn { from { opacity:0 } to { opacity:1 } }

.ss-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: rgba(0,0,0,0.4);
  z-index: 1;
}
.ss-header-title { color: rgba(255,255,255,0.7); font-size: 13px; }
.ss-header-dots { display: flex; gap: 5px; }
.ss-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.3); transition: all 0.2s;
}
.ss-dot.active { background: white; transform: scale(1.3); }
.ss-dot.coin-dot { background: rgba(255,180,100,0.5); }
.ss-dot.coin-dot.active { background: #FFB347; }
.ss-dot.photo-dot { background: rgba(100,200,100,0.5); }
.ss-dot.photo-dot.active { background: #66BB6A; }
.ss-close {
  background: rgba(255,255,255,0.15); color: white; border: none;
  border-radius: 8px; padding: 6px 14px; font-size: 13px;
  cursor: pointer; transition: background 0.15s;
}
.ss-close:hover { background: rgba(255,255,255,0.3); }

.ss-stage {
  position: relative;
  width: 100%;
  /* 16:9横長に固定 */
  aspect-ratio: 16 / 9;
  max-height: calc(100vh - 120px);
  overflow: hidden;
  flex-shrink: 0;
}

/* スライド共通 */
.ss-slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
}
.ss-slide.enter-left  { transform: translateX(100%); opacity: 0; }
.ss-slide.enter-right { transform: translateX(-100%); opacity: 0; }
.ss-slide.active      { transform: translateX(0); opacity: 1; }
.ss-slide.exit-left   { transform: translateX(-100%); opacity: 0; }
.ss-slide.exit-right  { transform: translateX(100%); opacity: 0; }

/* イントロスライド */
.ss-intro {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 32px 48px;
}
.ss-intro-stars { font-size: 36px; animation: starSpin 4s linear infinite; }
@keyframes starSpin { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
.ss-intro-text-block {
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  gap: 10px; flex-shrink: 0; width: 44%; min-width: 0;
  overflow: hidden;
}
.ss-intro-face {
  max-width: 50%; max-height: calc(100vh - 160px);
  border-radius: 16px; flex-shrink: 0;
  object-fit: contain; border: 4px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.ss-intro-face-placeholder {
  width: 44vw; max-height: calc(100vh - 160px); min-height: 200px; flex-shrink: 0;
  border-radius: 16px;
  background: rgba(255,255,255,0.1); border: 3px dashed rgba(255,255,255,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s;
  color: rgba(255,255,255,0.5); font-size: 18px; text-align: center; gap: 8px;
  flex-shrink: 1;
}
.ss-intro-face-placeholder:hover { background: rgba(255,255,255,0.18); }
.ss-intro-face-placeholder span { font-size: 56px; }
.ss-intro-date { font-size: 2.5vw; color: #FFB347; font-weight: bold; }
.ss-intro-title { font-size: 7vw; font-weight: bold; color: white; text-align: left; line-height: 1.4; white-space: nowrap; }
.ss-intro-name { font-size: 5vw; font-weight: bold; }

/* コインスライド */
/* コインスライド（写真なし）：横並びレイアウト */
.ss-coin {
  background: linear-gradient(135deg, #0d1117 0%, #1c1c2e 100%);
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 5%;
  padding: 6% 8%;
}
.ss-coin-icon {
  font-size: clamp(60px, 10vw, 130px);
  flex-shrink: 0;
  animation: coinPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes coinPop { from{transform:scale(0) rotate(-20deg)} to{transform:scale(1) rotate(0)} }
.ss-coin-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3%;
  min-width: 0;
}
.ss-coin-text {
  font-size: clamp(16px, 3vw, 42px);
  font-weight: bold; color: white;
  text-align: left; line-height: 1.5;

// ===== 学期フィルター =====
let selectedTerm = 0; // 0=全期間, 1=1学期, 2=2学期, 3=3学期

function getSchoolYear() {
  const now = new Date();
  return now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
}

function getTermRange(term) {
  const sy = getSchoolYear();
  if (term === 1) return { from: `${sy}-04-01`,    to: `${sy}-07-31` };
  if (term === 2) return { from: `${sy}-09-01`,    to: `${sy}-12-31` };
  if (term === 3) return { from: `${sy+1}-01-01`,  to: `${sy+1}-03-31` };
  return null; // 全期間
}

function filterRecordsByTerm(records) {
  if (selectedTerm === 0) return records;
  const range = getTermRange(selectedTerm);
  if (!range) return records;
  return records.filter(r => {
    const d = r.date || today();
    return d >= range.from && d <= range.to;
  });
}

function selectTerm(term) {

}

  }

  document.getElementById('combined-total').textContent = total;

    STUDENTS.map(s => `${getStudentName(s)}: ${filterRecordsByTerm(getData(s.id)).length}`).join('　');

  // 次ゴール計算
  let segEnd;
  if (total >= 100) {
    const steps = Math.floor((total - 100) / 25);
    segEnd = 100 + (steps + 1) * 25;
  } else {
    segEnd = COMBINED_MILESTONES.find(m => m > total) || 100;
  }
  document.getElementById('combined-next-label').textContent = `${segEnd}枚`;

  // 日付ごとにグループ化してセグメントを作成
  const byDate = {};
  all.forEach(r => {
    const d = r.date || today();
    byDate[d] = (byDate[d] || 0) + 1;
  });
  const sortedDates = Object.keys(byDate).sort();

  // カラーマップを日付順で確定（初回のみ）
  sortedDates.forEach(d => getSessionColor(d));

  const segBar = document.getElementById('segment-bar');
  if (!total) {
    segBar.innerHTML = '<div style="flex:1;background:#EEE;border-radius:20px;"></div>';
  } else {
    segBar.innerHTML = sortedDates.map(d => {

    // 残り（未達成部分）

  }

  // 目盛り
  const ticks = document.getElementById('milestone-ticks');

    ? [segEnd - 25, segEnd]

    const pos = Math.min(99, (m / segEnd) * 100);

    return `<div class="milestone-tick ${reached?'reached':''}" style="left:${pos}%">
      <div class="milestone-tick-label">${m}</div></div>`;

  // セッション凡例

    <div class="session-chip">
      <div class="session-dot" style="background:${getSessionColor(d)}"></div>
      ${fmtDateJP(d)}（${byDate[d]}枚）

// ===== 合同マイルストーンチェック（100超え対応） =====
function checkCombinedMilestone(prevTotal) {
  const newTotal = STUDENTS.reduce((sum, s) => sum + getData(s.id).length, 0); // マイルストーンは全データで判定（フィルターなし）
  // 通常マイルストーン（〜100）

  if (hit) { showCombinedCelebrate(COMBINED_MSG[hit]); launchBigConfetti(); return; }
  // 100超え：25枚ごと
  if (newTotal > 100) {
    const prevStep = Math.floor((prevTotal - 100) / 25);
    const currStep = Math.floor((newTotal  - 100) / 25);
    if (currStep > prevStep) {
      const n = 100 + currStep * 25;
      showCombinedCelebrate({
        emoji: '🎊',
        text: `２人合わせて　${n}枚達成！！`,
        sub: 'これからもどんどんためよう！！'

    }
  }
}

// ===== コイン瓶描画 =====
function drawJar(records) {
  const area = document.getElementById('coin-area');
  area.innerHTML = '';
  if (!records.length) return;

  // 瓶の内側サイズ
  const JAR_LEFT=28, JAR_RIGHT=152, JAR_BOTTOM=278, JAR_TOP=60;
  const jarW = JAR_RIGHT - JAR_LEFT;
  const jarH = JAR_BOTTOM - JAR_TOP;

  const COIN_R = 11;
  const cols = Math.floor(jarW / (COIN_R * 2 + 2));
  const coinData = [...records].reverse(); // 古い順に下から

  coinData.forEach((rec, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = JAR_LEFT + COIN_R + col * (COIN_R * 2 + 2) + (row % 2 === 1 ? COIN_R : 0);
    const cy = JAR_BOTTOM - COIN_R - row * (COIN_R * 1.8);
    if (cy < JAR_TOP) return;

    const s = STUDENTS[current];
    const beh = s.behaviors.find(b => b.label === rec.label);
    const fill = beh ? beh.color : s.color;

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', COIN_R);
    circle.setAttribute('fill', fill);
    circle.setAttribute('opacity', '0.85');

    const shine = document.createElementNS('http://www.w3.org/2000/svg','circle');
    shine.setAttribute('cx', cx - 3);
    shine.setAttribute('cy', cy - 3);
    shine.setAttribute('r', 4);
    shine.setAttribute('fill', 'rgba(255,255,255,0.4)');

    area.appendChild(circle);
    area.appendChild(shine);
  });
}

// ===== ミルストーンメッセージ（100超え対応） =====
function getMilestoneMsg(n) {
  if (!n) return '最初のコインをためよう！';
  if (n > 100) {
    const over = Math.floor((n - 100) / 25) * 25 + 100;
    const nextOver = over + 25;
    return `🌟 ${over}枚達成中！！　次は <b>${nextOver}枚</b> を目指そう！`;
  }
  const achieved = MILESTONES.filter(m => m <= n);
  const last = Math.max(...achieved);
  const msg = MILESTONE_MSG[last] || '';
  const next = MILESTONES.find(m => m > n);
  const nextMsg = next ? `　次は <b>${next}枚</b> を目指そう！` : '　次は <b>125枚</b> を目指そう！';
  return msg + nextMsg;
}

// ===== 編集モーダル =====
function getCustomLabels(id) {
  return JSON.parse(localStorage.getItem('hc_labels_' + id) || 'null');
}
function saveCustomLabels(id, labels) {
  localStorage.setItem('hc_labels_' + id, JSON.stringify(labels));
  _fbWrite('hc_labels_' + id, labels);
}
function getLabels(s) {
  const custom = getCustomLabels(s.id);
  return s.behaviors.map((b, i) => ({
    icon: b.icon,
    label: (custom && custom[i]) ? custom[i] : b.label,
    color: b.color,
  }));
}

function getCustomName(id) {
  return localStorage.getItem('hc_name_' + id) || null;
}
function saveCustomName(id, name) {
  if (name) {
    localStorage.setItem('hc_name_' + id, name);
    _fbWrite('hc_name_' + id, name);
  } else {
    localStorage.removeItem('hc_name_' + id);
    _fbDelete('hc_name_' + id);
  }
}
function getStudentName(s) {
  return getCustomName(s.id) || s.name;
}
function getStudentAvatar(s) {
  const name = getStudentName(s);
  return name.charAt(0);
}

// ===== 名前設定モーダル =====
function openSetup(isFirst) {
  if (document.getElementById('setup-modal')) return;
  const modal = document.createElement('div');
  modal.className = 'setup-overlay';
  modal.id = 'setup-modal';
  modal.innerHTML = `
    <div class="setup-box">
      <h2>👤 子どもの名前を設定</h2>
      <p class="setup-sub">${isFirst ? '使い始める前に、子どもの名前を入力してください。' : '名前を変えると全ての表示に反映されます。'}</p>
      ${STUDENTS.map((s, i) => {
        const name = getStudentName(s);
        const isDefault = !!DEFAULT_STUDENTS.find(d => d.id === s.id);
        return `
        <div class="setup-student-block" id="setup-block-${i}">
          <div class="setup-block-label">
            <div class="setup-avatar-preview" id="setup-av-${i}" style="background:${s.color};">${getStudentAvatar(s)}</div>
            子ども ${i + 1}
            ${!isDefault ? `<button onclick="removeStudentFromSetup('${s.id}')" style="margin-left:auto;background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;" title="削除">✕</button>` : ''}
          </div>
          <div class="setup-name-row">
            <input type="text" id="setup-name-${i}" value="${escHtml(name)}"
              placeholder="例：たろうさん" maxlength="20"
              oninput="updateSetupAvatar(${i})">
          </div>
        </div>`;
      }).join('')}
      <button onclick="addStudentToSetup()" style="width:100%;background:#f5f5f5;border:2px dashed #ddd;border-radius:10px;padding:12px;font-size:14px;color:#888;cursor:pointer;margin-bottom:16px;font-family:inherit;">＋ 子どもを追加</button>
      <div class="setup-actions">
        ${isFirst ? '' : '<button class="btn-setup-cancel" onclick="closeSetup()">キャンセル</button>'}
        <button class="btn-setup-save" onclick="saveSetup()">✅ 保存して始める</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  if (!isFirst) {
    modal.addEventListener('click', e => { if (e.target === modal) closeSetup(); });
  }
  setTimeout(() => document.getElementById('setup-name-0')?.focus(), 50);
}

function addStudentToSetup() {
  STUDENTS.forEach((s, i) => {
    const val = document.getElementById(`setup-name-${i}`)?.value.trim();
    if (val) saveCustomName(s.id, val);
  });
  addNewStudentSlot();
  closeSetup();
  openSetup(false);
}

function removeStudentFromSetup(id) {
  if (!confirm('この子のデータは残ります。タブから外しますか？')) return;
  removeExtraStudent(id);
  if (current >= STUDENTS.length) current = 0;
  closeSetup();
  openSetup(false);
  rebuildTabs();
  render();
}

function updateSetupAvatar(i) {
  const val = document.getElementById(`setup-name-${i}`).value;
  const av = document.getElementById(`setup-av-${i}`);
  if (av) av.textContent = val.charAt(0) || STUDENTS[i].avatar;
}

function closeSetup() {
  const m = document.getElementById('setup-modal');
  if (m) m.remove();
}

function saveSetup() {
  STUDENTS.forEach((s, i) => {
    const val = document.getElementById(`setup-name-${i}`)?.value.trim();
    saveCustomName(s.id, val || null);
  });
  localStorage.setItem('hc_setup_done', '1');
  closeSetup();
  applyNamesToUI();
  render();
}

function applyNamesToUI() {
  rebuildTabs();
  STUDENTS.forEach((s, i) => {
    const avEl = document.getElementById('combined-avatar-' + i);
    if (avEl) { avEl.textContent = getStudentAvatar(s); avEl.style.background = s.color; }
  });
}

function openEdit() {
  const s = STUDENTS[current];
  const labels = getLabels(s);
  const currentName = getStudentName(s);
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'edit-modal';
  modal.innerHTML = `
    <div class="modal-box">
      <h2>⚙️ 名前・ボタンの文を編集</h2>
      <p class="modal-sub">変えたい内容を書き直してください。</p>
      <div style="background:#FFF3E0;border-radius:10px;padding:12px 14px;margin-bottom:16px;">
        <div style="font-size:12px;font-weight:bold;color:#888;margin-bottom:8px;">👤 名前</div>
        <div class="edit-row" style="margin-bottom:0;">
          <span class="edit-icon">🏷️</span>
          <input type="text" id="edit-name" value="${escHtml(currentName)}" maxlength="20" placeholder="${escHtml(s.name)}">
        </div>
      </div>
      <div style="font-size:12px;font-weight:bold;color:#888;margin-bottom:8px;">⭐ ボタンの文</div>
      ${labels.map((b, i) => `
        <div class="edit-row">
          <span class="edit-icon">${b.icon}</span>
          <input type="text" id="edit-input-${i}" value="${escHtml(b.label)}" maxlength="30">
        </div>
      `).join('')}
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeEdit()">キャンセル</button>
        <button class="btn-modal-save" onclick="saveEdit()">💾 保存する</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) closeEdit(); });
}

function closeEdit() {
  const m = document.getElementById('edit-modal');
  if (m) m.remove();
}

function saveEdit() {
  const s = STUDENTS[current];
  const newName = document.getElementById('edit-name').value.trim();
  saveCustomName(s.id, newName || null);
  const newLabels = s.behaviors.map((_, i) => {
    const val = document.getElementById(`edit-input-${i}`).value.trim();
    return val || s.behaviors[i].label;
  });
  saveCustomLabels(s.id, newLabels);
  closeEdit();
  // 個別画面では名前をヘッダーに反映
  if (currentStudentId && newName) {
    const list = getStudentList();
    const entry = list.find(x => x.id === currentStudentId);
    if (entry) {
      entry.name = newName;
      saveStudentList(list);
      document.getElementById('app-header-title').textContent = newName + '　のほめほめコイン';
      // currentStudentObj の名前も更新
      if (currentStudentObj) currentStudentObj.name = newName;
      STUDENTS[0].name = newName;
    }
  }
  render();
}

// ===== 描画 =====
function render() {
  const s = STUDENTS[current];
  const records = filterRecordsByTerm(getData(s.id));

  // バッジ
  const av = document.getElementById('s-avatar');
  av.textContent = getStudentAvatar(s);
  av.style.background = s.color;
  document.getElementById('s-name').textContent = getStudentName(s);
  document.getElementById('coin-num').textContent = records.length;
  document.getElementById('milestone-msg').innerHTML = getMilestoneMsg(records.length);

  // 瓶
  drawJar(records);
  // renderCombined() は合計バーがある旧UIでのみ使用（個別画面では不要）

  // 行動ボタン（カスタムラベル対応）
  const labels = getLabels(s);
  const grid = document.getElementById('behavior-grid');
  grid.innerHTML = labels.map((b, i) => `
    <button class="behavior-btn" onclick="addBehavior(${i})"
            style="border-color:${b.color}20; background:${b.color}15;">
      <span class="icon">${b.icon}</span>
      <span>${escHtml(b.label)}</span>
    </button>
  `).join('');

  // 記録一覧（日付グループ）
  const list = document.getElementById('records-list');
  if (!records.length) {
    list.innerHTML = `<div class="empty-msg"><div class="e">⭐</div>まだ記録がありません。<br>よかったことをタップしよう！</div>`;
    return;
  }

  // 日付ごとにグループ化
  const byDate = {};
  records.forEach((rec, i) => {
    const d = rec.date || today();
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({ rec, idx: i });
  });
  const sortedDates = Object.keys(byDate).sort().reverse();

  const lbl = getLabels(s);
  list.innerHTML = sortedDates.map(d => {
    const items = byDate[d];
    const photos = getPhotos(s.id, d);
    const photoHTML = photos.length ? `
      <div class="photo-strip">
        ${photos.map((p, pi) => `
          <div class="photo-thumb">
            <img src="${p}" onclick="openPhotoPreview('${s.id}','${d}',${pi})" alt="写真">
            <button class="photo-thumb-del" onclick="deletePhoto('${s.id}','${d}',${pi})" title="削除">✕</button>
          </div>`).join('')}
      </div>` : '';

    const itemsHTML = items.map(({ rec, idx }) => {
      const beh = lbl.find(b => b.label === rec.label);
      const col = beh ? beh.color : s.color;
      const icon = beh ? beh.icon : '⭐';
      const rp = getRecordPhoto(s.id, rec.ts);
      return `
        <div class="record-item" style="border-left-color:${col};">
          <span class="record-coin">${icon}</span>
          <span class="record-text">${escHtml(rec.label)}</span>
          <label class="record-photo-btn ${rp ? 'has-photo' : ''}" title="${rp ? '写真あり（クリックで変更）' : '写真を追加'}">
            ${rp ? '📸' : '📷'}
            <input type="file" accept="image/*" style="display:none" onchange="addRecordPhoto(this,'${s.id}',${rec.ts})">
          </label>
          <button class="record-edit-label" onclick="editRecordLabel(${idx})" title="内容を修正">✏️</button>
          <button class="record-edit-date" onclick="editRecordDate(${idx})" title="日付を変更">📅</button>
          <button class="record-del" onclick="delRecord(${idx})" title="削除">✕</button>
        </div>`;
    }).join('');

    return `
      <div class="date-group">
        <div class="date-group-header">
          <span class="date-group-title">${fmtDateJP(d)}</span>
          <span class="date-group-coins">${items.length}枚</span>
          <label class="btn-add-photo">
            📸 写真追加
            <input type="file" accept="image/*" multiple style="display:none"
              onchange="addPhotos(this,'${s.id}','${d}')">
          </label>
          <button class="btn-slideshow" onclick="openSlideshow('${s.id}','${d}')">🎬 振り返り</button>
        </div>
        ${photoHTML}
        ${itemsHTML}
      </div>`;
  }).join('');
}

// ===== コイン追加 =====
function setCombinedToday() {
  const el = document.getElementById('combined-record-date');
  if (el) el.value = today();
}
function getCombinedRecordDate() {
  return document.getElementById('combined-record-date')?.value || today();
}

function addBehaviorFor(studentId, behaviorIdx) {
  const s = STUDENTS.find(st => st.id === studentId);
  if (!s) return;
  const b = getLabels(s)[behaviorIdx];
  const records = getData(studentId);
  const prevCount = records.length;
  const prevCombined = STUDENTS.reduce((sum, st) => sum + getData(st.id).length, 0);
  records.push({ label: b.label, date: getCombinedRecordDate(), ts: Date.now() });
  saveData(studentId, records);
  animateCoin(b.label);
  checkMilestone(prevCount, records.length);
  checkCombinedMilestone(prevCombined);
  renderCombinedView();
  renderCombined();
}

function addFreeFor(studentId) {
  const inputId = 'free-text-' + studentId;
  const txt = document.getElementById(inputId)?.value.trim();
  if (!txt) return;
  const s = STUDENTS.find(st => st.id === studentId);
  if (!s) return;
  const records = getData(studentId);
  const prevCount = records.length;
  const prevCombined = STUDENTS.reduce((sum, st) => sum + getData(st.id).length, 0);
  records.push({ label: txt, date: getCombinedRecordDate(), ts: Date.now() });
  saveData(studentId, records);
  document.getElementById(inputId).value = '';
  animateCoin(txt);
  checkMilestone(prevCount, records.length);
  checkCombinedMilestone(prevCombined);
  renderCombinedView();
  renderCombined();
}

function addBehavior(idx) {
  const s = STUDENTS[current];
  const b = getLabels(s)[idx];
  const records = getData(s.id);
  const prevCount = records.length;
  const prevCombined = STUDENTS.reduce((sum, st) => sum + getData(st.id).length, 0);
  records.push({ label: b.label, date: getRecordDate(), ts: Date.now() });
  saveData(s.id, records);
  animateCoin(b.label);
  checkMilestone(prevCount, records.length);
  checkCombinedMilestone(prevCombined);
  render();
}

function addFree() {
  const txt = document.getElementById('free-text').value.trim();
  if (!txt) return;
  const s = STUDENTS[current];
  const records = getData(s.id);
  const prevCount = records.length;
  const prevCombined = STUDENTS.reduce((sum, st) => sum + getData(st.id).length, 0);
  records.push({ label: txt, date: getRecordDate(), ts: Date.now() });
  saveData(s.id, records);
  document.getElementById('free-text').value = '';
  animateCoin(txt);
  checkMilestone(prevCount, records.length);
  checkCombinedMilestone(prevCombined);
  render();
}

function delRecord(idx) {
  if (!confirm('このコインを削除しますか？')) return;
  const s = STUDENTS[current];
  const records = getData(s.id);
  records.splice(idx, 1);
  saveData(s.id, records);
  render();
}

function editRecordLabel(idx) {
  const s = STUDENTS[current];
  const records = getData(s.id);
  const rec = records[idx];
  const newLabel = prompt('内容を修正してください：', rec.label);
  if (newLabel === null) return;
  if (!newLabel.trim()) { alert('内容を入力してください。'); return; }
  records[idx].label = newLabel.trim();
  saveData(s.id, records);
  render();
}

function editRecordLabelFor(studentId, ts) {
  const records = getData(studentId);
  const idx = records.findIndex(r => r.ts === ts);
  if (idx === -1) return;
  const newLabel = prompt('内容を修正してください：', records[idx].label);
  if (newLabel === null) return;
  if (!newLabel.trim()) { alert('内容を入力してください。'); return; }
  records[idx].label = newLabel.trim();
  saveData(studentId, records);
  renderCombinedView();
  renderCombined();
}

function editRecordDate(idx) {
  const s = STUDENTS[current];
  const records = getData(s.id);
  const rec = records[idx];
  const current_date = rec.date || today();
  const newDate = prompt('日付を入力してください（例：2025-04-20）', current_date);
  if (!newDate || !newDate.trim()) return;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate.trim())) {
    alert('日付の形式が正しくありません。\n例：2025-04-20');
    return;
  }
  records[idx].date = newDate.trim();
  saveData(s.id, records);
  render();
}

// ===== アニメーション =====
function animateCoin(label) {
  const s = STUDENTS[current];
  const beh = s.behaviors.find(b => b.label === label);
  const icon = beh ? beh.icon : '⭐';
  const el = document.createElement('div');
  el.className = 'coin-fly';
  el.textContent = icon;
  const jarRect = document.querySelector('.jar-wrap').getBoundingClientRect();
  el.style.left = (jarRect.left + jarRect.width/2 - 16) + 'px';
  el.style.top  = (jarRect.top + 40) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function checkMilestone(prev, curr) {
  // 通常マイルストーン
  const hit = MILESTONES.find(m => m > prev && m <= curr);
  if (hit) { showCelebrate(MILESTONE_MSG[hit]); launchConfetti(); return; }
  // 100超え：25枚ごと
  if (curr > 100) {
    const prevStep = Math.floor((prev - 100) / 25);
    const currStep = Math.floor((curr - 100) / 25);
    if (currStep > prevStep) {
      const n = 100 + currStep * 25;
      showCelebrate(`🌟 ${n}枚達成！！すごいぞ！`);
      launchConfetti();
    }
  }
}

function showCelebrate(msg) {
  const el = document.createElement('div');
  el.className = 'celebrate';
  el.innerHTML = `
    <div class="celebrate-box">
      <div class="celebrate-emoji">🎉</div>
      <div class="celebrate-text">${msg.replace(/<b>|<\/b>/g,'')}</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2300);
}

function launchConfetti() {
  const colors = ['#FF8C69','#FFB347','#66BB6A','#42A5F5','#AB47BC','#FF7043','#26C6DA'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.width = el.style.height = (8 + Math.random() * 8) + 'px';
      el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 50);
  }
}

// ===== 出力モーダル =====
function openExportModal() {
  const s = STUDENTS[current];
  const records = filterRecordsByTerm(getData(s.id));
  if (!records.length) { alert('記録がありません。'); return; }

  // 最古・最新日付を取得
  const dates = records.map(r => r.date).sort();
  const minDate = dates[0];
  const maxDate = dates[dates.length - 1];

  const modal = document.createElement('div');
  modal.className = 'export-modal-overlay';
  modal.id = 'export-modal';
  modal.innerHTML = `
    <div class="export-modal-box">
      <h2>📄 一覧を出力　― ${getStudentName(s)}</h2>
      <p class="modal-sub">出力したい期間を選んでください。空白のままで全期間を出力します。</p>
      <div class="date-range-row">
        <label>開始日</label>
        <input type="date" id="export-from" value="${minDate}">
        <label>〜　終了日</label>
        <input type="date" id="export-to" value="${maxDate}">
      </div>
      <div class="export-preview" id="export-preview"></div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeExportModal()">キャンセル</button>
        <button class="btn-modal-save" onclick="doExport()">💾 ダウンロード</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) closeExportModal(); });

  // 入力変化で件数プレビュー更新
  modal.querySelectorAll('input[type="date"]').forEach(el => {
    el.addEventListener('change', updateExportPreview);
  });
  updateExportPreview();
}

function updateExportPreview() {
  const s = STUDENTS[current];
  const from = document.getElementById('export-from')?.value;
  const to   = document.getElementById('export-to')?.value;
  const filtered = getFilteredRecords(s, from, to);
  const prev = document.getElementById('export-preview');
  if (prev) prev.textContent = `対象：${filtered.length}件　（${from ? fmtDate(from) : '〜'} ～ ${to ? fmtDate(to) : '〜'}）`;
}

function getFilteredRecords(s, from, to) {
  return getData(s.id).filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    return true;
  }).sort((a, b) => a.date.localeCompare(b.date));
}

function doExport() {
  const s = STUDENTS[current];
  const from = document.getElementById('export-from')?.value;
  const to   = document.getElementById('export-to')?.value;
  const records = getFilteredRecords(s, from, to);
  if (!records.length) { alert('該当する記録がありません。'); return; }

  const periodLabel = (from || to)
    ? `${from ? fmtDate(from) : ''}〜${to ? fmtDate(to) : ''}`
    : '全期間';

  let text = `ほめほめコイン　記録一覧\n`;
  text += `児童：${getStudentName(s)}　　期間：${periodLabel}　　合計：${records.length}枚\n`;
  text += `出力日：${fmtDate(today())}\n`;
  text += '─'.repeat(45) + '\n';

  // 日付ごとにグループ化して出力
  const byDate = {};
  records.forEach(r => {
    const d = r.date || '';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(r.label);
  });
  let no = 1;
  Object.keys(byDate).sort().forEach(d => {
    text += `\n【${fmtDate(d)}】\n`;
    byDate[d].forEach(label => {
      text += `  No.${String(no).padStart(3,'0')}　${label}\n`;
      no++;
    });
  });
  text += '\n' + '─'.repeat(45) + '\n';

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ほめほめ記録_${getStudentName(s)}_${today()}.txt`;
  a.click();
  closeExportModal();
}

function closeExportModal() {
  const m = document.getElementById('export-modal');
  if (m) m.remove();
}

function switchStudent(idx) {
  current = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  const mainEl = document.querySelector('main');
  const combEl = document.getElementById('combined-view');
  if (idx === STUDENTS.length) {
    mainEl.style.display = 'none';
    combEl.classList.add('active');
    renderCombinedView();
  } else {
    mainEl.style.display = '';
    combEl.classList.remove('active');
    render();
  }
}

function rebuildTabs() {
  const container = document.getElementById('tabs-container');
  if (!container) return;
  const combIdx = STUDENTS.length;
  container.innerHTML = STUDENTS.map((s, i) =>
    `<button class="tab ${i===current?'active':''}" onclick="switchStudent(${i})" id="tab-${i}">${escHtml(getStudentName(s))}</button>`
  ).join('') +
  `<button class="tab ${current===combIdx?'active':''}" onclick="switchStudent(${combIdx})" id="tab-${combIdx}">👥 みんなまとめて</button>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 顔写真ストレージ =====
function getFacePhoto(studentId) {

}
function updateFacePhoto(inputEl, studentId) {
  const file = inputEl.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    localStorage.setItem(`hc_face_${studentId}`, e.target.result);
    // スライドの顔写真を即時更新
    const overlay = document.getElementById('slideshow-overlay');
    if (overlay) {
      overlay.querySelectorAll('.ss-intro').forEach(slide => {
        const nameEl = slide.querySelector('.ss-intro-name');
        const _fs = STUDENTS.find(s => s.id === studentId);
        if (nameEl && _fs && nameEl.textContent.includes(getStudentName(_fs))) {
          const existing = slide.querySelector('.ss-intro-face, .ss-intro-face-placeholder');
          if (existing) {
            const img = document.createElement('img');
            img.className = 'ss-intro-face';
            img.src = e.target.result;
            img.alt = '顔写真';
            img.title = '写真を変更';
            img.onclick = () => { const fi = document.createElement('input'); fi.type='file'; fi.accept='image/*'; fi.onchange=ev=>updateFacePhoto(ev.target,studentId); fi.click(); };
            existing.replaceWith(img);
          }
        }
      });
    }
  };
  reader.readAsDataURL(file);
}

function openCombinedSlideshowOld() {
  const allSlides = [];
  STUDENTS.forEach(s => {
    const records = getData(s.id);
    if (!records.length) return;
    const labels = getLabels(s);
    const dates = [...new Set(records.map(r => r.date || today()))].sort();
    const latestDate = dates[dates.length - 1];
    const latestRecords = records.filter(r => (r.date || today()) === latestDate);
    // イントロ
    allSlides.push({ type: 'intro', student: s, date: latestDate });
    // コイン（写真つき）
    latestRecords.forEach(rec => {
      const beh = labels.find(b => b.label === rec.label);
      allSlides.push({
        type: 'coin',
        label: rec.label,
        icon:  beh ? beh.icon  : '⭐',
        color: beh ? beh.color : s.color,
        photo: getRecordPhoto(s.id, rec.ts) || null,
      });
    });
    // 日付ごとの写真
    getPhotos(s.id, latestDate).forEach(src => allSlides.push({ type: 'photo', src }));
    // しめくくり
    allSlides.push({ type: 'finish', student: s, count: latestRecords.length });
  });
  if (!allSlides.length) { alert('まだ記録がありません。'); return; }
  buildSlideshow(allSlides, STUDENTS[0], 'combined');
}

function openCombinedSlideshowForDate(date) {
  const allSlides = [];
  STUDENTS.forEach(s => {
    const records = getData(s.id).filter(r => (r.date || today()) === date);
    if (!records.length) return;
    const labels = getLabels(s);
    // イントロなし・各コインに名前タグ
    records.forEach(rec => {
      const beh = labels.find(b => b.label === rec.label);
      allSlides.push({
        type: 'coin', label: rec.label,
        icon: beh ? beh.icon : '⭐', color: beh ? beh.color : s.color,
        photo: getRecordPhoto(s.id, rec.ts) || null,
        studentName: getStudentName(s),
        studentColor: s.color,
      });
    });
    getPhotos(s.id, date).forEach(src => allSlides.push({ type: 'photo', src, studentName: getStudentName(s), studentColor: s.color }));
  });
  if (!allSlides.length) { alert('この日の記録がありません。'); return; }
  const names = STUDENTS.filter(s => getData(s.id).some(r => (r.date||today())===date)).map(s => getStudentName(s)).join('・');
  buildSlideshow(allSlides, STUDENTS[0], date, `${names} ― ${fmtDateJP(date)} の振り返り`);
}

// ===== 日付ごとの写真ストレージ =====
function getPhotos(studentId, date) {
  return JSON.parse(localStorage.getItem(`hc_photos_${studentId}_${date}`) || '[]');
}
function savePhotos(studentId, date, photos) {
  localStorage.setItem(`hc_photos_${studentId}_${date}`, JSON.stringify(photos));
}

function addPhotos(input, studentId, date) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const photos = getPhotos(studentId, date);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photos.push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        savePhotos(studentId, date, photos);
        render();
      }
    };
    reader.readAsDataURL(file);
  });
}

function deletePhoto(studentId, date, photoIdx) {
  if (!confirm('この写真を削除しますか？')) return;
  const photos = getPhotos(studentId, date);
  photos.splice(photoIdx, 1);
  savePhotos(studentId, date, photos);
  render();
}

function openPhotoPreview(studentId, date, photoIdx) {
  const photos = getPhotos(studentId, date);
  if (!photos[photoIdx]) return;
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:30000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn 0.2s ease;';
  ov.innerHTML = `<img src="${photos[photoIdx]}" style="max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.6);">`;
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
}

function openSlideshow(studentId, date) {
  const s = STUDENTS.find(x => x.id === studentId);
  if (!s) return;
  const records = getData(studentId).filter(r => (r.date || today()) === date);
  const photos  = getPhotos(studentId, date);
  const labels  = getLabels(s);

  // スライド配列を構築（個別：イントロあり・名前タグなし）
  const slides = [];
  // 1. イントロ
  slides.push({ type: 'intro', student: s, date });
  // 2. コイン１枚ずつ
  records.forEach(rec => {
    const beh = labels.find(b => b.label === rec.label);
    slides.push({
      type: 'coin',
      label: rec.label,
      icon:  beh ? beh.icon  : '⭐',
      color: beh ? beh.color : s.color,
      photo: getRecordPhoto(studentId, rec.ts) || null,
    });
  });
  // 3. 写真１枚ずつ
  photos.forEach(src => slides.push({ type: 'photo', src }));
  // 4. しめくくり
  slides.push({ type: 'finish', student: s, count: records.length });

  buildSlideshow(slides, s, date);
}

function buildSlideshow(slides, s, date, titleOverride) {
  let idx = 0;

  function slideHTML(sl, i) {
    const baseClass = 'ss-slide';
    switch (sl.type) {
      case 'intro': {
        const facePhoto = getFacePhoto(sl.student.id);
        const faceHTML = facePhoto
          ? `<img class="ss-intro-face" src="${facePhoto}" alt="顔写真"
               onclick="document.getElementById('face-input-${sl.student.id}-${i}').click()" title="写真を変更">
             <input type="file" id="face-input-${sl.student.id}-${i}" accept="image/*" style="display:none"
               onchange="updateFacePhoto(this,'${sl.student.id}')">`
          : `<label class="ss-intro-face-placeholder">
               <span>📷</span>顔写真を登録
               <input type="file" accept="image/*" style="display:none"
                 onchange="updateFacePhoto(this,'${sl.student.id}')">
             </label>`;
        return `<div class="${baseClass} ss-intro" data-si="${i}">
          <div class="ss-intro-text-block">
            <div class="ss-intro-stars">✨</div>
            <div class="ss-intro-title"><div>こんなことが</div><div>できたよ！</div></div>
            <div class="ss-intro-date">${fmtDateJP(sl.date)}</div>
            <div class="ss-intro-name" style="color:${sl.student.color}">― ${getStudentName(sl.student)} ―</div>
          </div>
          ${faceHTML}
        </div>`;
      }
      case 'coin': {
        const nameTag = sl.studentName
          ? `<div class="ss-name-tag" style="background:${sl.studentColor || sl.color};color:white;">${escHtml(sl.studentName)}</div>`
          : '';
        return sl.photo
          ? `<div class="${baseClass} ss-coin has-photo" data-si="${i}">
              ${nameTag}
              <div class="ss-coin-left">
                <div class="ss-coin-icon">${sl.icon}</div>
                <div class="ss-coin-text">${escHtml(sl.label)}</div>
                <div class="ss-coin-badge" style="background:${sl.color}30;border:2px solid ${sl.color};">🪙 できた！</div>
              </div>
              <img class="ss-coin-photo" src="${sl.photo}" alt="写真">
            </div>`
          : `<div class="${baseClass} ss-coin" data-si="${i}">
              ${nameTag}
              <div class="ss-coin-icon">${sl.icon}</div>
              <div class="ss-coin-right">
                <div class="ss-coin-text">${escHtml(sl.label)}</div>
                <div class="ss-coin-badge" style="background:${sl.color}30;border:2px solid ${sl.color};">🪙 できた！</div>
              </div>
            </div>`;
      }
      case 'photo': {
        const photoNameTag = sl.studentName
          ? `<div class="ss-name-tag" style="background:${sl.studentColor || '#888'};color:white;">${escHtml(sl.studentName)}</div>`
          : '';
        return `<div class="${baseClass} ss-photo" data-si="${i}">
          ${photoNameTag}
          <img src="${sl.src}" alt="写真">
        </div>`;
      }
      case 'finish':
        return `<div class="${baseClass} ss-finish" data-si="${i}">
          <div class="ss-finish-emoji">🏆</div>
          <div class="ss-finish-count">${sl.count}</div>
          <div class="ss-finish-label">枚のコインをためました！</div>
          <div class="ss-finish-msg">すばらしい！<br>これからもがんばろう！</div>
        </div>`;
      default: return '';
    }
  }

  function dotsHTML() {
    return slides.map((sl, i) => {
      const type = sl.type === 'coin' ? 'coin-dot' : sl.type === 'photo' ? 'photo-dot' : '';
      return `<div class="ss-dot ${type} ${i === idx ? 'active' : ''}"></div>`;
    }).join('');
  }

  const overlay = document.createElement('div');
  overlay.className = 'slideshow-overlay';
  overlay.id = 'slideshow-overlay';
  overlay.innerHTML = `
    <div class="ss-header">
      <div class="ss-header-title">${titleOverride || (getStudentName(s) + ' ― ' + fmtDateJP(date) + ' の振り返り')}</div>
      <div class="ss-header-dots" id="ss-dots">${dotsHTML()}</div>
      <button class="ss-close" onclick="printSlideshow()" style="background:rgba(255,255,255,0.15);margin-right:6px;">🖨️ 印刷</button>
      <button class="ss-close" onclick="closeSlideshow()">✕ 閉じる</button>
    </div>
    <div class="ss-stage" id="ss-stage">
      ${slides.map((sl, i) => slideHTML(sl, i)).join('')}
    </div>
    <div class="ss-nav">
      <button class="ss-btn" id="ss-prev" onclick="ssGo(-1)" disabled>‹</button>
      <div class="ss-counter" id="ss-counter">1 / ${slides.length}</div>
      <button class="ss-btn" id="ss-next" onclick="ssGo(1)" ${slides.length <= 1 ? 'disabled' : ''}>›</button>
    </div>`;
  document.body.appendChild(overlay);

  // 初期状態：classだけで管理（inline styleは使わない）
  const slideEls = [...overlay.querySelectorAll('.ss-slide')];
  slideEls.forEach((el, i) => {
    if (i === 0) {
      el.classList.add('active');
    } else {
      el.classList.add('enter-left'); // 右に隠す
    }
  });

  function goToSlide(newIdx, dir) {
    const prevIdx = idx;
    idx = newIdx;
    const els = [...overlay.querySelectorAll('.ss-slide')];

    const ANIM = ['active','enter-left','enter-right','exit-left','exit-right'];

    // 現在スライドをexit
    ANIM.forEach(c => els[prevIdx].classList.remove(c));
    els[prevIdx].classList.add(dir > 0 ? 'exit-left' : 'exit-right');

    // 新スライドをenter位置にセット→強制リフロー→activeへ
    ANIM.forEach(c => els[newIdx].classList.remove(c));
    const enterClass = dir > 0 ? 'enter-left' : 'enter-right';
    els[newIdx].classList.add(enterClass);
    void els[newIdx].offsetWidth; // 強制リフロー：transitionを確実に発火させる
    els[newIdx].classList.remove(enterClass);
    els[newIdx].classList.add('active');

    // UI更新
    document.getElementById('ss-dots').innerHTML = dotsHTML();
    document.getElementById('ss-counter').textContent = `${idx + 1} / ${slides.length}`;
    document.getElementById('ss-prev').disabled = idx === 0;
    document.getElementById('ss-next').disabled = idx === slides.length - 1;
  }

  ssState = {
    go(dir) {
      const ni = idx + dir;
      if (ni < 0 || ni >= slides.length) return;
      goToSlide(ni, dir);
    }
  };

  // キーボード操作
  function onKey(e) {
    if (!document.getElementById('slideshow-overlay')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); ssGo(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); ssGo(-1); }
    if (e.key === 'Escape') closeSlideshow();
  }
  document.addEventListener('keydown', onKey);
  overlay._removeKey = () => document.removeEventListener('keydown', onKey);
}

// ===== スライド印刷 =====
function printSlideshow() {
  const overlay = document.getElementById('slideshow-overlay');
  if (!overlay) return;

  const slideEls = [...overlay.querySelectorAll('.ss-slide')];
  const title = overlay.querySelector('.ss-header-title')?.textContent || '';
  const COLS = 2, ROWS = 4, PER_PAGE = COLS * ROWS;

  // スライドごとのミニカードHTML生成
  function miniCard(el) {
    const CELL = 'width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px;box-sizing:border-box;border-radius:8px;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;';

    if (el.classList.contains('ss-intro')) {
      const textBlock = el.querySelector('.ss-intro-text-block');
      const date  = textBlock?.querySelector('.ss-intro-date')?.textContent || '';
      const name  = textBlock?.querySelector('.ss-intro-name')?.textContent || '';
      const nameColor = textBlock?.querySelector('.ss-intro-name')?.style?.color || '#FFB347';
      const faceImg = el.querySelector('.ss-intro-face');
      const faceHTML = faceImg
        ? `<img src="${faceImg.src}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;margin-bottom:4px;border:2px solid rgba(255,255,255,0.3);">`
        : '<div style="font-size:22px;">✨</div>';
      return `<div style="${CELL}background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;">
        ${faceHTML}
        <div style="font-size:9px;font-weight:bold;line-height:1.4;margin-bottom:2px;">こんなことが<br>できたよ！</div>
        <div style="font-size:8px;color:#FFB347;">${date}</div>
        <div style="font-size:8px;color:${nameColor};">${name}</div>
      </div>`;
    }

    if (el.classList.contains('ss-coin')) {
      const icon  = el.querySelector('.ss-coin-icon')?.textContent || '⭐';
      const text  = el.querySelector('.ss-coin-text')?.textContent || '';
      const badge = el.querySelector('.ss-coin-badge');
      const badgeStyle = badge ? badge.style.cssText : '';
      const coinImg = el.querySelector('.ss-coin-photo');
      const photoHTML = coinImg
        ? `<img src="${coinImg.src}" style="max-width:90%;max-height:52px;object-fit:contain;border-radius:4px;margin-top:4px;">`
        : '';
      const nameTagEl = el.querySelector('.ss-name-tag');
      const nameTagHTML = nameTagEl
        ? `<div style="position:absolute;top:4px;left:4px;padding:2px 7px;border-radius:10px;font-size:6px;font-weight:bold;color:white;background:${nameTagEl.style.background};">${nameTagEl.textContent}</div>`
        : '';
      return `<div style="${CELL}position:relative;background:linear-gradient(135deg,#0d1117,#1c1c2e);color:white;">
        ${nameTagHTML}
        <div style="font-size:26px;margin-bottom:4px;">${icon}</div>
        <div style="font-size:8px;font-weight:bold;line-height:1.4;">${escHtml(text)}</div>
        <div style="margin-top:4px;padding:2px 8px;border-radius:10px;font-size:7px;${badgeStyle}">🪙 できた！</div>
        ${photoHTML}
      </div>`;
    }

    if (el.classList.contains('ss-photo')) {
      const img = el.querySelector('img');
      const nameTagEl = el.querySelector('.ss-name-tag');
      const nameTagHTML = nameTagEl
        ? `<div style="position:absolute;top:4px;left:4px;padding:2px 7px;border-radius:10px;font-size:6px;font-weight:bold;color:white;background:${nameTagEl.style.background};">${nameTagEl.textContent}</div>`
        : '';
      return `<div style="${CELL}position:relative;background:#000;">
        ${nameTagHTML}
        ${img ? `<img src="${img.src}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;">` : ''}
      </div>`;
    }

    if (el.classList.contains('ss-finish')) {
      const count = el.querySelector('.ss-finish-count')?.textContent || '';
      const msg   = el.querySelector('.ss-finish-msg')?.textContent   || '';
      return `<div style="${CELL}background:linear-gradient(135deg,#1a0a3e,#2d1b69);color:white;">
        <div style="font-size:22px;">🏆</div>
        <div style="font-size:22px;font-weight:bold;color:#FFB347;">${count}枚</div>
        <div style="font-size:7px;margin-top:4px;line-height:1.4;">${escHtml(msg)}</div>
      </div>`;
    }
    return '<div></div>';
  }

  // 8枚ずつページに分割
  const container = document.createElement('div');
  container.id = 'print-slides-container';

  for (let p = 0; p < Math.ceil(slideEls.length / PER_PAGE); p++) {
    const chunk = slideEls.slice(p * PER_PAGE, (p + 1) * PER_PAGE);
    const page = document.createElement('div');
    page.className = 'print-slide-page';
    page.style.cssText = 'display:block;page-break-after:always;break-after:page;';

    // ページタイトル
    const header = document.createElement('div');
    header.style.cssText = 'font-size:12px;font-weight:bold;color:#333;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #FF8C69;display:flex;align-items:center;gap:6px;';
    header.innerHTML = `<span style="font-size:16px;">⭐</span>${escHtml(title)}`;
    page.appendChild(header);

    // 2列×4行グリッド
    const grid = document.createElement('div');
    grid.style.cssText = `display:grid;grid-template-columns:repeat(${COLS},1fr);gap:8px;`;

    chunk.forEach(el => {
      const cell = document.createElement('div');
      cell.style.cssText = 'aspect-ratio:16/9;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.2);';
      cell.innerHTML = miniCard(el);
      grid.appendChild(cell);
    });

    page.appendChild(grid);
    container.appendChild(page);
  }

  document.body.appendChild(container);
  document.body.classList.add('printing-slides');
  window.print();
  document.body.classList.remove('printing-slides');
  container.remove();
}

// ===== 生徒リスト管理（ホーム画面用） =====
function getStudentList() {
  const stored = localStorage.getItem('hc_student_list');
  if (stored) return JSON.parse(stored);
  // 初回：既存のカスタム名があれば引き継ぐ
  return [
    { id: 'MS2', name: localStorage.getItem('hc_name_MS2') || '子ども１', color: '#FF8C69' },
    { id: 'FA',  name: localStorage.getItem('hc_name_FA')  || '子ども２', color: '#66BB6A' },
  ];
}
function saveStudentList(list) {
  localStorage.setItem('hc_student_list', JSON.stringify(list));
  _fbWrite('hc_student_list', list);
}
function addStudent(name) {
  const list = getStudentList();
  const colors = ['#FF8C69','#66BB6A','#42A5F5','#AB47BC','#FF7043','#26C6DA','#FFA726','#EC407A'];
  const color = colors[list.length % colors.length];
  const id = 'ST_' + Date.now();
  list.push({ id, name, color });
  saveStudentList(list);
  return id;
}
function removeStudent(id) {
  const list = getStudentList().filter(s => s.id !== id);
  saveStudentList(list);
}
function getStudentCoins(id) {
  return JSON.parse(localStorage.getItem('hc_' + id) || '[]').length;
}
function getAvatarChar(name) {
  return name.charAt(0) || '?';
}

// ===== 小集団指導：グループ管理 =====
const GROUP_COLORS = ['#42A5F5','#AB47BC','#FF7043','#26C6DA','#FFA726','#EC407A','#66BB6A','#FF8C69'];
const MEMBER_COLORS = ['#FF8C69','#66BB6A','#42A5F5','#AB47BC','#FF7043','#26C6DA','#FFA726','#EC407A'];

function getGroupList() {
  return JSON.parse(localStorage.getItem('hc_group_list') || '[]');
}
function saveGroupList(list) {
  localStorage.setItem('hc_group_list', JSON.stringify(list));
  _fbWrite('hc_group_list', list);
}
function getGroupTotalCoins(group) {
  return group.members.reduce((sum, m) => sum + JSON.parse(localStorage.getItem('hc_' + m.id) || '[]').length, 0);
}

function promptAddGroup() {
  const name = prompt('グループの名前を入力してください：\n（例：月曜グループ、Aチームなど）');
  if (!name || !name.trim()) return;

  const membersInput = prompt('メンバーの名前を入力してください。\n（カンマ区切りで複数入力 例：A君,B君,C君）');
  if (!membersInput || !membersInput.trim()) return;

  const memberNames = membersInput.split(/[,、，]/).map(s => s.trim()).filter(s => s);
  if (!memberNames.length) return;

  const groups = getGroupList();
  const gid = 'GRP_' + Date.now();
  const color = GROUP_COLORS[groups.length % GROUP_COLORS.length];
  const members = memberNames.map((n, i) => ({
    id: gid + '_M' + i,
    name: n,
    color: MEMBER_COLORS[i % MEMBER_COLORS.length],
  }));
  groups.push({ id: gid, name: name.trim(), color, members });
  saveGroupList(groups);
  renderGroupCards();
}

function deleteGroupCard(gid) {
  if (!confirm('このグループを削除しますか？\n（コインの記録データは残ります）')) return;
  const groups = getGroupList().filter(g => g.id !== gid);
  saveGroupList(groups);
  renderGroupCards();
}

function renderGroupCards() {
  const groups = getGroupList();
  const container = document.getElementById('group-cards');
  if (!container) return;
  container.innerHTML = groups.map(g => {
    const total = getGroupTotalCoins(g);
    const memberNames = g.members.map(m => m.name).join('・');
    return `
      <div class="group-card" onclick="enterGroup('${g.id}')">
        <button class="group-card-del" onclick="event.stopPropagation();deleteGroupCard('${g.id}')" title="削除">✕</button>
        <div class="group-card-icon" style="background:${g.color}20;font-size:28px;">👥</div>
        <div class="group-card-name">${escHtml(g.name)}</div>
        <div class="group-card-members">${escHtml(memberNames)}</div>
        <div class="group-card-coins">${total}<small>合計コイン</small></div>
        <button class="btn-add-group-member" onclick="event.stopPropagation();promptAddGroupMember('${g.id}')" title="メンバーを追加">＋ メンバー追加</button>
      </div>`;
  }).join('');
}

function promptAddMemberToCurrentGroup() {
  if (!currentGroupId) return;
  promptAddGroupMember(currentGroupId);
  // グループ更新後にタブ・表示も再構築
  const groups = getGroupList();

  const defaultBehaviors = [

    { icon: '🤝', label: '友達にやさしくできた', color: '#66BB6A' },

function promptAddGroupMember(gid) {
  const groups = getGroupList();
  const group = groups.find(g => g.id === gid);
  if (!group) return;
  const nameInput = prompt(`「${group.name}」にメンバーを追加します。\n名前を入力してください：`);
  if (!nameInput || !nameInput.trim()) return;
  const name = nameInput.trim();
  const newMember = {
    id: gid + '_M' + Date.now(),
    name,
    color: MEMBER_COLORS[group.members.length % MEMBER_COLORS.length],
  };
  group.members.push(newMember);
  saveGroupList(groups);
  renderGroupCards();
}

// グループモードに入る
function enterGroup(gid) {
  const groups = getGroupList();
  const group = groups.find(g => g.id === gid);
  if (!group) return;

  currentMode = 'group';
  currentStudentId = null;
  currentGroupId = gid;
  _absentIds.clear(); // グループ切り替え時に休みフラグをリセット
  const addMemberBtn = document.getElementById('btn-add-member-header');
  if (addMemberBtn) addMemberBtn.style.display = '';

  const defaultBehaviors = [
    { icon: '⭐', label: 'よくがんばった！', color: '#FFB347' },
    { icon: '💬', label: '気持ちを言葉で伝えることができた', color: '#42A5F5' },
    { icon: '🤝', label: '友達にやさしくできた', color: '#66BB6A' },
    { icon: '🌟', label: '新しいことに挑戦できた', color: '#AB47BC' },
  ];
  STUDENTS = group.members.map(m => ({
    id: m.id,
    name: m.name,
    avatar: m.name.charAt(0),
    color: m.color,
    behaviors: JSON.parse(JSON.stringify(defaultBehaviors)),
  }));
  current = 0;

  // 学期タブをリセット
  selectedTerm = 0;
  document.querySelectorAll('.term-tab').forEach((t, i) => t.classList.toggle('active', i === 0));

  // グループモード：合計バーとタブを表示
  const combinedPanel = document.getElementById('combined-panel');
  if (combinedPanel) combinedPanel.style.display = '';
  const tabsContainer = document.getElementById('tabs-container');
  if (tabsContainer) tabsContainer.style.display = '';
  const combinedView = document.getElementById('combined-view');
  if (combinedView) combinedView.classList.remove('active');

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = '';
  document.getElementById('app-header-title').textContent = group.name;

  document.getElementById('record-date').value = today();
  rebuildTabs();
  render();
  renderCombined();
}

// ===== モード切り替え =====
function showModeSelect() {
  document.getElementById('mode-select-area').style.display = '';
  document.getElementById('indiv-area').style.display = 'none';
  document.getElementById('group-area').style.display = 'none';
}

function showIndivMode() {
  document.getElementById('mode-select-area').style.display = 'none';
  document.getElementById('indiv-area').style.display = '';
  document.getElementById('group-area').style.display = 'none';
  renderHome();
}

function showGroupMode() {
  document.getElementById('mode-select-area').style.display = 'none';
  document.getElementById('indiv-area').style.display = 'none';
  document.getElementById('group-area').style.display = '';
  renderGroupCards();
}

function renderHome() {
  const list = getStudentList();
  const container = document.getElementById('student-cards');
  container.innerHTML = list.map(s => {
    const coins = getStudentCoins(s.id);
    return `
      <div class="student-card" onclick="enterStudent('${s.id}')">
        <button class="student-card-del" onclick="event.stopPropagation();deleteStudentCard('${s.id}')" title="削除">✕</button>
        <div class="student-card-avatar" style="background:${s.color};">${getAvatarChar(s.name)}</div>
        <div class="student-card-name">${escHtml(s.name)}</div>
        <div class="student-card-coins">${coins}<small>コイン</small></div>
      </div>`;
  }).join('');
}

function promptAddStudent() {
  const name = prompt('子どもの名前を入力してください：');
  if (!name || !name.trim()) return;
  addStudent(name.trim());
  renderHome();
}

function deleteStudentCard(id) {
  if (!confirm('このカードを削除しますか？\n（コインの記録データは残ります）')) return;
  removeStudent(id);
  renderHome();
}

function openManageStudents() {
  const list = getStudentList();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'manage-modal';
  modal.innerHTML = `
    <div class="modal-box">
      <h2>👤 子どもの名前を変更</h2>
      <p class="modal-sub">名前を変えてもコインのデータは消えません。</p>
      ${list.map((s, i) => `
        <div class="edit-row">
          <div class="edit-icon" style="width:32px;height:32px;border-radius:50%;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:white;">${getAvatarChar(s.name)}</div>
          <input type="text" id="manage-name-${i}" value="${escHtml(s.name)}" maxlength="20">
        </div>
      `).join('')}
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeManageModal()">キャンセル</button>
        <button class="btn-modal-save" onclick="saveManageModal()">💾 保存する</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) closeManageModal(); });
}

function closeManageModal() {
  const m = document.getElementById('manage-modal');
  if (m) m.remove();
}

function saveManageModal() {
  const list = getStudentList();
  list.forEach((s, i) => {
    const val = document.getElementById(`manage-name-${i}`)?.value.trim();
    if (val) s.name = val;
  });
  saveStudentList(list);
  closeManageModal();
  renderHome();
}

function openStudentSettings() {
  openEdit();
}

// ===== Firebase リアルタイム同期 =====
let _fbSyncTimer = null;
let _fbIgnoreNext = false; // 自分の書き込みによる即時再レンダリングを1回スキップ

function _refreshCurrentView() {
  const homeScreen = document.getElementById('home-screen');
  if (!homeScreen || homeScreen.style.display !== 'none') {
    // ホーム画面表示中
    const indivArea = document.getElementById('indiv-area');
    if (indivArea && indivArea.style.display !== 'none') {
      try { renderHome(); } catch(e) {}
    }
    const groupArea = document.getElementById('group-area');
    if (groupArea && groupArea.style.display !== 'none') {
      try { renderGroupCards(); } catch(e) {}
    }
    return;
  }
  // コイン記録画面
  if (currentMode === 'indiv') {
    try { render(); renderCombined(); } catch(e) {}
  } else if (currentMode === 'group') {
    try { renderCombinedView(); renderCombined(); } catch(e) {}
  }
}

_fbDB.ref('data').on('value', snapshot => {
  const data = snapshot.val() || {};

  // localStorageを更新（写真・初回設定フラグ以外）
  Object.keys(localStorage).forEach(key => {
    if (key.startsWith('hc_') && !_isPhotoKey(key) && key !== 'hc_setup_done') {
      if (!(key in data)) localStorage.removeItem(key);
    }
  });
  Object.entries(data).forEach(([key, value]) => {
    if (!_isPhotoKey(key)) {
      localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
    }
  });

  // デバウンスしてUIを更新
  if (_fbSyncTimer) clearTimeout(_fbSyncTimer);
  _fbSyncTimer = setTimeout(() => {
    _fbSyncTimer = null;
    _refreshCurrentView();
  }, 400);
});

// ===== 初期化 =====
// 合計バーとタブは最初は非表示（ホーム画面を表示するため）
const _initCombinedPanel = document.getElementById('combined-panel');
if (_initCombinedPanel) _initCombinedPanel.style.display = 'none';
const _initTabsContainer = document.getElementById('tabs-container');
if (_initTabsContainer) _initTabsContainer.style.display = 'none';
// ホーム画面のモード選択を表示
showModeSelect();
</script>
